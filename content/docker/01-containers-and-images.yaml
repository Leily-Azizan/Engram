chapter:
  title: "Containers, Images and Layers"
  slug: containers-and-images
  order: 1
  summary: "What a container actually is, how images are layered, and the Linux primitives underneath."

lessons:
  - title: "Containers vs virtual machines"
    slug: containers-vs-vms
    order: 1
    est_minutes: 18
    summary: "Why containers are lightweight, and what they really are at the OS level."
    body: |
      ## The one-sentence definition

      A **container is an isolated process** (or group of processes) running on the
      host kernel, with its own view of the filesystem, network, and process tree.
      It is *not* a virtual machine.

      ## Containers vs VMs

      | | Virtual machine | Container |
      |-|-----------------|-----------|
      | Isolates | hardware (full guest OS + kernel) | a process (shares host kernel) |
      | Boots | a whole OS (seconds–minutes) | just a process (milliseconds) |
      | Size | GBs (OS image) | MBs (just app + deps) |
      | Overhead | hypervisor + guest kernel | almost none |

      A VM virtualises *hardware* and runs its own kernel. A container shares the
      **host's kernel** and just isolates a process — which is why it starts
      instantly and is tiny.

      ## Why this matters

      - **Density**: run dozens of containers where you'd fit a few VMs.
      - **Speed**: start/stop in milliseconds → great for scaling and CI.
      - **Consistency**: the image bundles the app *and* its dependencies, so
        "works on my machine" becomes "works everywhere the kernel runs it."

      The catch: because containers share the host kernel, they are **less
      isolated** than VMs (a kernel exploit can cross the boundary), and a Linux
      image needs a Linux kernel (on Mac/Windows, Docker runs a tiny Linux VM).
    deep_dive: |
      ### What "isolation" actually is: namespaces + cgroups

      There is no "container" object in the Linux kernel. A container is an
      illusion built from three ordinary kernel features:

      **1. Namespaces — what a process can *see*.** Each namespace virtualises one
      global resource so the process inside gets its own private view:

      | Namespace | Isolates |
      |-----------|----------|
      | `pid` | process IDs (container's first process sees itself as PID 1) |
      | `mnt` | mount points / filesystem view |
      | `net` | network interfaces, routing, ports |
      | `uts` | hostname |
      | `ipc` | shared memory / semaphores |
      | `user` | UID/GID mapping (root in container ≠ root on host) |

      When Docker starts a container it calls `clone()` with flags like
      `CLONE_NEWPID | CLONE_NEWNS | CLONE_NEWNET …`, creating a process that lives
      in fresh namespaces. That's why `ps` inside the container shows only its own
      processes — it literally cannot see the host's PID namespace.

      **2. cgroups — what a process can *use*.** Control groups limit and account
      for resources: CPU shares, memory ceilings, block-IO, PIDs. `docker run -m 512m
      --cpus 1.5` just writes those limits into the container's cgroup. Exceed the
      memory limit and the kernel's OOM killer stops the container — the same
      mechanism that protects the host.

      **3. A root filesystem (chroot-on-steroids).** The `mnt` namespace plus
      `pivot_root` give the process a different `/` — the image's filesystem —
      so it can't see the host's files.

      Put together: *namespaces scope visibility, cgroups cap consumption, and a
      pivoted root swaps the filesystem.* Tools like `runc` wire these up per the
      OCI spec; Docker is the friendly layer on top. Because it's all just kernel
      features on the host kernel, a container is as cheap as starting a process —
      and that is the whole reason containers exist.
    cards:
      - front: "In one sentence, what is a container?"
        back: "An isolated process running on the host's kernel with its own view of the filesystem, network, and process tree — not a VM."
      - front: "Key difference between a container and a VM?"
        back: "A VM virtualises hardware and runs its own guest kernel; a container shares the host kernel and only isolates a process — so it's far smaller and starts in milliseconds."
      - front: "Which two Linux kernel features provide container isolation and resource limits?"
        back: "Namespaces (isolate what a process can *see*: pid, net, mnt, etc.) and cgroups (limit what it can *use*: CPU, memory, IO)."
      - cloze: "A container shares the host's {{c1::kernel}}, while a VM runs its own {{c2::kernel}} on virtualised hardware."
      - cloze: "Linux {{c1::namespaces}} scope what a process can see; {{c2::cgroups}} cap what it can consume."
    feynman:
      - "Explain to a teammate why a container starts in milliseconds but a VM takes seconds."
      - "There's no 'container' object in the kernel — so what is a container actually made of?"
    labs:
      - title: "Prove a container is just an isolated process"
        slug: lab-container-is-a-process
        difficulty: core
        est_minutes: 20
        scenario: |
          You'll show, hands-on, that a container is a host process with a private
          view — not a separate machine.
        deliverable: |
          1. Run `docker run -d --name web nginx`.
          2. From INSIDE the container, list processes (`docker exec web ps aux`) —
             note nginx is PID 1.
          3. From the HOST, find the same nginx process (`ps aux | grep nginx` or
             `docker top web`) — note it has a normal host PID.
          4. Explain in one line why both are true.
        hints: |
          - `docker exec`, `docker top`, host `ps`.
          - The PID namespace is why PIDs differ inside vs outside.
        solution: |
          ```bash
          docker run -d --name web nginx
          docker exec web ps aux        # nginx master = PID 1 (container's pid ns)
          docker top web                # same process, host PID (e.g. 24815)
          ps aux | grep nginx           # visible on the host too
          ```
          Both are true because it's **one process** that the host's PID namespace
          sees with a real PID, while the container's own PID namespace renumbers
          it as PID 1.

  - title: "Images, layers and the union filesystem"
    slug: images-and-layers
    order: 2
    est_minutes: 20
    summary: "Images are stacks of read-only layers; containers add a thin writable layer on top."
    body: |
      ## An image is a stack of layers

      A Docker **image** is a read-only template made of **layers**, each layer a
      set of filesystem changes. When you run an image, Docker adds a thin
      **writable layer** on top — that's the **container**.

      ```
      Container  ─► [ writable layer ]   ← your changes live here
      Image      ─► [ layer: app code ]
                    [ layer: pip install ]
                    [ layer: apt deps   ]
                    [ base: python:3.12 ]   ← read-only, shared
      ```

      ## Why layers are powerful

      - **Sharing**: ten containers from the same image share the read-only
        layers on disk and in cache — only their writable layers differ.
      - **Caching**: rebuilds reuse unchanged layers (fast).
      - **Distribution**: pushing/pulling only transfers layers you don't already
        have.

      ## Seeing it

      ```bash
      docker pull python:3.12       # watch it pull each layer
      docker images                 # list images + sizes
      docker history python:3.12    # the layers and the command that made each
      docker image inspect python:3.12
      ```

      Tags (`python:3.12`) are human labels; the real identity of an image is its
      content **digest** (`sha256:...`).
    deep_dive: |
      ### How layers become one filesystem: OverlayFS + copy-on-write

      The image's layers are separate directories on disk, but the container sees
      a single unified `/`. That magic is a **union/overlay filesystem** — on
      modern Docker, **OverlayFS**.

      OverlayFS merges directories into one mount:

      - **lowerdir** — the image's read-only layers, stacked.
      - **upperdir** — the container's writable layer.
      - **merged** — the unified view the container actually uses.

      **Reading** a file: overlay looks top-down and returns the first hit, so an
      upper-layer file shadows a lower one.

      **Writing** triggers **copy-on-write (CoW)**: the first time the container
      modifies a file that lives in a read-only lower layer, overlay copies it up
      into the writable layer, then edits the copy. The original image layer is
      never touched — which is exactly why many containers can safely share the
      same read-only layers, and why deleting a huge file inside a container
      doesn't shrink the image (it just adds a "whiteout" marker in the upper
      layer).

      **Why this shapes everything:**
      - Each Dockerfile instruction (`RUN`, `COPY`, …) creates **one new layer** =
        one diff over the previous. That's why instruction order affects cache and
        image size.
      - Layers are **content-addressed** by a sha256 of their contents, so an
        identical layer is stored once and reused across images (dedup) and skipped
        on push/pull if the registry already has that digest.
      - A container's writable layer is **ephemeral** — destroy the container and
        those CoW changes vanish. That single fact is *why volumes exist* (next
        chapters): persistent data must live outside the writable layer.

      So an image isn't a disk snapshot; it's a content-addressed stack of diffs,
      unioned at runtime and made writable by copy-on-write.
    cards:
      - front: "What's the difference between an image and a container, in terms of layers?"
        back: "An image is a stack of read-only layers; a container is that image plus a thin writable layer on top where its changes (copy-on-write) live."
      - front: "What does copy-on-write mean for a container modifying an image file?"
        back: "The file is copied from the read-only image layer up into the container's writable layer and edited there; the image layer is untouched — so containers can share image layers safely."
      - front: "Why does each Dockerfile instruction create a new layer, and why care?"
        back: "Each instruction records a filesystem diff as a layer. Ordering affects build-cache reuse and final image size, and identical layers are deduplicated/skipped on transfer."
      - front: "Tags vs digests — which is the true identity of an image?"
        back: "The content digest (sha256:…). Tags like `python:3.12` are mutable human labels that can be re-pointed."
      - cloze: "Docker unions image layers with an overlay filesystem: read-only image layers are the {{c1::lowerdir}}, the container's writable layer is the {{c2::upperdir}}."
      - cloze: "A container's writable layer is {{c1::ephemeral}} — it disappears when the container is removed, which is why {{c2::volumes}} exist."
    feynman:
      - "Explain copy-on-write using overlay's lower/upper directories."
      - "Why doesn't deleting a 1 GB file inside a running container make the image smaller?"
    labs:
      - title: "Watch layers and sharing in action"
        slug: lab-layers
        difficulty: core
        est_minutes: 18
        scenario: |
          You want to see that images are layered and that layers are shared/cached.
        deliverable: |
          1. Pull `python:3.12` and inspect its layers with `docker history`.
          2. Pull `python:3.12-slim` and note how many layers/bytes were already
             present vs newly downloaded.
          3. Run two containers from the same image; explain what they share on disk.
        hints: |
          - `docker history`, `docker images`, `docker pull` output shows reused layers.
        solution: |
          ```bash
          docker pull python:3.12
          docker history python:3.12          # layers + the command that built each
          docker pull python:3.12-slim        # "Already exists" lines = shared layers
          docker run -d --name a python:3.12 sleep 1000
          docker run -d --name b python:3.12 sleep 1000
          ```
          Both containers share the **read-only image layers** on disk; only their
          thin writable layers differ — so two containers cost barely more disk
          than one.

quiz:
  title: "Containers, Images & Layers — chapter exam"
  slug: docker-containers-images-exam
  scope: chapter
  description: "What containers are, and how images/layers work."
  questions:
    - type: mcq
      text: "What does a container share with its host that a VM does not?"
      explanation: "Containers share the host kernel; VMs run their own guest kernel."
      choices:
        - {text: "The kernel", correct: true}
        - {text: "The application code"}
        - {text: "The writable layer"}
        - {text: "The hypervisor"}
    - type: mcq
      text: "Which two kernel features provide container isolation and resource limits?"
      explanation: "Namespaces isolate visibility; cgroups limit resource usage."
      choices:
        - {text: "Namespaces and cgroups", correct: true}
        - {text: "Hypervisor and BIOS"}
        - {text: "systemd and udev"}
        - {text: "iptables and SELinux"}
    - type: true_false
      text: "Changes written inside a running container persist after the container is removed."
      explanation: "False — the writable layer is ephemeral; use volumes for persistence."
      choices:
        - {text: "True"}
        - {text: "False", correct: true}
    - type: command
      text: "Show the layer history (and the command that built each layer) of the image python:3.12."
      explanation: "`docker history <image>` lists layers and their creating commands."
      answers:
        - "docker history python:3.12"
        - {value: "docker image history python:3.12", match: exact}
    - type: mcq
      text: "Which filesystem mechanism lets a container modify an image file without changing the image?"
      explanation: "Copy-on-write via the overlay filesystem copies the file to the writable upper layer."
      choices:
        - {text: "Copy-on-write (OverlayFS)", correct: true}
        - {text: "RAID 1 mirroring"}
        - {text: "Swap"}
        - {text: "tmpfs"}
    - type: mcq
      text: "What uniquely identifies an image's exact content?"
      explanation: "The sha256 digest; tags are mutable labels."
      choices:
        - {text: "Its sha256 digest", correct: true}
        - {text: "Its tag"}
        - {text: "Its container name"}
        - {text: "Its creation date"}
