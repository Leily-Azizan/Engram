chapter:
  title: "Administrative Tasks"
  slug: administrative-tasks
  order: 8
  summary: "Manage users, groups and password aging, monitor logins, schedule jobs with cron/at, and handle locale and time zones."

lessons:
  - title: "Manage users and groups"
    slug: users-and-groups
    order: 1
    est_minutes: 22
    summary: "The account files and the commands to create, modify, and remove users and groups."
    body: |
      ## Where accounts live

      | File | Holds |
      |------|-------|
      | `/etc/passwd` | user accounts (name, UID, GID, home, shell) |
      | `/etc/shadow` | password hashes & aging (root-only) |
      | `/etc/group` | groups and their members |

      A `/etc/passwd` line: `leily:x:1000:1000:Leily:/home/leily:/bin/bash`
      (the `x` means the hash is in `/etc/shadow`).

      ## Managing users

      ```bash
      sudo useradd -m -s /bin/bash sara   # create with home dir + shell
      sudo passwd sara                    # set a password
      sudo usermod -aG sudo sara          # ADD to a group (keep existing!)
      sudo userdel -r sara                # delete + remove home
      ```

      ⚠️ Always use `usermod -aG` (append). Plain `-G` *replaces* a user's
      supplementary groups and can lock them out of `sudo`.

      ## Managing groups

      ```bash
      sudo groupadd devs
      sudo gpasswd -a sara devs           # add member
      groups sara                         # show a user's groups
      id sara                             # UID, GID, and all groups
      ```
    deep_dive: |
      ### The kernel only knows numbers; names and groups are bolted on top

      **UID is the real identity; the name is cosmetic.** The kernel enforces
      permissions purely on numeric **UID/GID** stored in each process's
      credentials — it has never heard of "leily". The mapping name→UID lives in
      `/etc/passwd` and is resolved in *userspace* by the NSS library, which is why
      two accounts sharing UID 0 are both root regardless of name, and why deleting
      a user leaves files showing a bare number. A process actually carries
      **real, effective, and saved** UIDs, the split that lets `sudo` and setuid
      programs switch privilege precisely.

      **Passwords are salted hashes, not encryption.** `/etc/shadow` (root-only,
      unlike world-readable `/etc/passwd`) stores `$id$salt$hash` — e.g. `$6$` for
      SHA-512 or `$y$` for yescrypt. Login hashes your input with the stored salt
      and compares; the salt guarantees two users with the same password get
      different hashes, defeating precomputed rainbow tables.

      **Why a new group needs a fresh login.** Your group set is resolved *once*,
      when the session starts, and baked into the process credentials — then
      inherited by every child via `fork()`. Adding yourself to `docker` or `sudo`
      with `usermod -aG` updates `/etc/group`, but your *running* shell still holds
      the old credential, so you must re-login (or `newgrp`) to pick it up.
    cards:
      - front: "Which file stores password hashes, and who can read it?"
        back: "`/etc/shadow` — readable only by root (the `x` in /etc/passwd points to it)."
      - front: "Why must you use `usermod -aG` rather than `usermod -G`?"
        back: "`-aG` *appends* to supplementary groups; `-G` alone *replaces* them all, which can remove the user from sudo and other groups."
      - front: "Which command shows a user's UID, GID, and all group memberships at once?"
        back: "`id <user>`"
      - cloze: "User accounts live in `/etc/{{c1::passwd}}`, password hashes in `/etc/{{c2::shadow}}`, and groups in `/etc/{{c3::group}}`."
    feynman:
      - "Explain what would go wrong if you ran `usermod -G devs leily` on your own admin account."
    labs:
      - title: "Onboard a teammate"
        slug: lab-onboard-user
        difficulty: core
        est_minutes: 20
        scenario: |
          A new engineer 'sara' is joining. She needs a normal account with a
          home directory, membership in the `devs` group, and sudo access —
          without disturbing anyone else's group memberships.
        deliverable: |
          1. Create the `devs` group if needed.
          2. Create user `sara` with a home dir and Bash shell.
          3. Add her to `devs` and to `sudo` (append, don't replace).
          4. Verify her UID and group memberships in one command.
        hints: |
          - `groupadd`, `useradd -m -s`, `usermod -aG`, `id`
        solution: |
          ```bash
          sudo groupadd -f devs
          sudo useradd -m -s /bin/bash sara
          sudo passwd sara
          sudo usermod -aG devs,sudo sara
          id sara
          ```

  - title: "Password aging, account locks, and who's logged in"
    slug: password-aging-and-logins
    order: 2
    est_minutes: 22
    summary: "Enforce password policy with chage, lock/unlock accounts, and see who is (or was) on the machine."
    body: |
      ## Password aging — `chage`

      Aging rules live per-account in `/etc/shadow`, next to the hash.
      `chage` reads and writes them:

      ```bash
      sudo chage -l ali        # show ali's aging policy
      sudo chage -d 0 ali      # force password change at NEXT login
      sudo chage -M 90 ali     # max 90 days between changes
      sudo chage -m 1 ali      # min 1 day (blocks instant change-back)
      sudo chage -W 7 ali      # warn 7 days before expiry
      sudo chage -E 2026-12-31 ali   # account (not just password) expires
      ```

      `chage -d 0` is the classic **onboarding move**: the admin sets a
      temporary password with `passwd ali`, then expires it so ali must pick
      his own at first login. (`passwd -e ali` is a shortcut for the same.)

      ## Locking and unlocking

      ```bash
      sudo passwd -l ali       # lock (prepends ! to the hash — nothing to guess)
      sudo passwd -u ali       # unlock
      sudo passwd -S ali       # status: L=locked, P=usable, NP=no password
      sudo usermod -s /usr/sbin/nologin svc-backup   # service account: no shell
      ```

      Locking beats deleting for a departing user: their files keep a valid
      owner and you can still investigate later.

      ## Who is logged in — and who was

      | Command | Answers |
      |---------|---------|
      | `who`   | who is logged in now (terminal, time, source IP) |
      | `w`     | who is logged in **and what they're running** (+ load) |
      | `last`  | login **history**, newest first (incl. reboots) |
      | `lastlog` | most recent login per account — spot never-used accounts |

      ## Team directory: group-only access

      The standard pattern for a shared project directory:

      ```bash
      sudo mkdir -p /srv/projects/backend
      sudo chgrp devteam /srv/projects/backend
      sudo chmod 2770 /srv/projects/backend
      ```

      `770` = owner+group everything, others nothing. The leading `2` is the
      **setgid bit**: files created inside inherit the `devteam` group instead
      of each creator's primary group, so teammates can always read each
      other's work.
    deep_dive: |
      ### Days-since-epoch, a `!` in a hash, and two files the kernel appends to

      **Aging is just arithmetic on day numbers.** Each `/etc/shadow` line stores
      the *last password change* as **days since 1970-01-01** (field 3), plus
      min/max/warn as plain day counts. At login, PAM's `pam_unix` compares
      `today - lastchange` against `max`: if it's over, you're forced into the
      change dialog. `chage -d 0` writes a literal `0` into field 3 — "changed on
      Jan 1 1970" — which makes *any* `max` exceeded, and that is the whole
      forced-change trick. An empty field 3 means "never expire-check".

      **A lock is one prepended character.** `passwd -l` doesn't delete the hash;
      it turns `$y$j9T$...` into `!$y$j9T$...`. Since `!` can never appear in a
      valid crypt output, no input hashes to it — authentication is impossible,
      yet `passwd -u` restores the account by deleting one byte. Compare
      `usermod -s /usr/sbin/nologin`: the password still *works* (so `su` from
      root, cron, and SSH keys with forced commands may still function), but an
      interactive shell is refused. Lock the hash to stop *authentication*;
      change the shell to stop *sessions*.

      **`who` and `last` read logs, not the kernel.** There is no syscall for
      "who is logged in". Instead, every login program (getty, sshd, your
      terminal emulator) appends a record to `/var/run/utmp` (current sessions)
      and `/var/log/wtmp` (permanent history). `who`/`w` parse utmp; `last`
      parses wtmp backwards. That's why a crashed session can leave a "ghost"
      user in `who`, and why wiping wtmp is a classic attacker move — the data
      is only as honest as the files.
    cards:
      - front: "Force user ali to change his password at next login (two ways)."
        back: "`sudo chage -d 0 ali` or `sudo passwd -e ali` — both expire the current password immediately."
      - front: "What does `chage -l ali` show?"
        back: "Ali's password-aging policy: last change, min/max days, warning period, and account expiry date."
      - front: "Difference between `who` and `w`?"
        back: "`who` lists current logins (tty, time, source); `w` adds what each user is running plus load average."
      - front: "How does `passwd -l` lock an account under the hood?"
        back: "It prepends `!` to the hash in /etc/shadow — no password can match, and `passwd -u` just removes the `!`."
      - front: "Why chmod **2**770 (not 770) on a shared team directory?"
        back: "The 2 is the setgid bit: new files inside inherit the directory's group, so all team members can access each other's files."
      - cloze: "`{{c1::who}}` shows current logins from /var/run/{{c2::utmp}}; `{{c3::last}}` shows login history from /var/log/{{c4::wtmp}}."
    feynman:
      - "Explain to a junior admin why `chage -d 0` forces a password change — what exactly changes in /etc/shadow and who checks it?"
      - "A colleague wants to delete a departing employee's account immediately. Argue for locking it instead, and show the command."
    labs:
      - title: "Onboard the devteam (bootcamp scenario)"
        slug: lab-devteam-onboarding
        difficulty: core
        est_minutes: 25
        scenario: |
          Your company is standing up a development team (this is the exact
          scenario from the DevOps bootcamp). You must: create a `devteam`
          group; create users `ali` and `sara` and put them in it; set up
          `/srv/projects/backend` so that **only** devteam members can access
          it; change ali's password and make sure he's forced to change it at
          his next login; and finally check who is currently logged in.
        deliverable: |
          1. Create the group `devteam`.
          2. Create `ali` and `sara` with home dirs and Bash shells, and add
             both to `devteam` without touching their other groups.
          3. Create `/srv/projects/backend` owned by group `devteam`, mode
             such that others have no access and new files inherit the group.
          4. Set a temporary password for `ali`, then expire it so he must
             change it on next login. Verify with `chage -l ali`.
          5. Show who is currently logged in, and the recent login history.
        hints: |
          - `groupadd`, `useradd -m -s`, `usermod -aG`
          - Directory: `chgrp` + `chmod 2770` (why the 2?)
          - Expire: `chage -d 0` (or `passwd -e`)
          - Sessions: `who` / `w`; history: `last`
        solution: |
          ```bash
          sudo groupadd devteam
          sudo useradd -m -s /bin/bash ali
          sudo useradd -m -s /bin/bash sara
          sudo usermod -aG devteam ali
          sudo usermod -aG devteam sara

          sudo mkdir -p /srv/projects/backend
          sudo chgrp devteam /srv/projects/backend
          sudo chmod 2770 /srv/projects/backend   # rwx owner+group, setgid

          sudo passwd ali            # set temporary password
          sudo chage -d 0 ali        # force change at next login
          sudo chage -l ali          # verify: "Last password change: password must be changed"

          who                        # current sessions
          w                          # sessions + activity
          last | head                # recent login history
          ```

  - title: "Schedule jobs (cron and at), locale and time"
    slug: cron-locale-time
    order: 3
    est_minutes: 22
    summary: "Recurring jobs with cron, one-off jobs with at, and getting locale/timezone right."
    body: |
      ## cron — recurring jobs

      Edit your user crontab with `crontab -e`. Each line:

      ```
      ┌ minute (0-59)
      │ ┌ hour (0-23)
      │ │ ┌ day of month (1-31)
      │ │ │ ┌ month (1-12)
      │ │ │ │ ┌ day of week (0-7, 0/7=Sun)
      │ │ │ │ │
      * * * * *  command
      ```

      ```bash
      0 2 * * *   /home/leily/backup.sh      # every day at 02:00
      */15 * * * * /usr/local/bin/check.sh    # every 15 minutes
      0 9 * * 1   echo "Monday standup"       # 09:00 each Monday
      ```

      System-wide jobs live in `/etc/crontab` and `/etc/cron.d/`, plus the
      `/etc/cron.{hourly,daily,weekly,monthly}/` directories.

      ## at — one-off jobs

      ```bash
      echo "systemctl restart nginx" | at 23:30
      atq          # list pending at jobs
      atrm 3       # remove job 3
      ```

      ## Locale and time

      ```bash
      timedatectl                       # current time, zone, NTP status
      sudo timedatectl set-timezone Asia/Tehran
      locale                            # current locale settings
      date '+%F %T'                     # formatted date/time
      ```
    deep_dive: |
      ### How cron fires, and what "the time" even is

      **crond just wakes up and compares.** The cron daemon sleeps until the top of
      each minute, then scans every crontab and runs the jobs whose five fields
      match the current minute — there's no event system, only this once-a-minute
      check, which is why cron can't do sub-minute schedules. `atd` is its one-shot
      cousin: it runs a job once at a set time and forgets it.

      **The classic "works in my shell, fails in cron" bug.** cron jobs run with a
      *bare* environment — no `~/.bashrc`, a minimal `PATH` (often just
      `/usr/bin:/bin`), and no terminal. A script that relies on your interactive
      `PATH` or aliases breaks. The fix is to use absolute paths or set `PATH` at
      the top of the script/crontab.

      **System time is UTC underneath; the zone is just a lens.** Linux keeps time
      as seconds since the 1970 epoch in **UTC**, plus a battery-backed RTC
      hardware clock. A timezone (`/etc/localtime`, `$TZ`) is only an offset applied
      when *displaying* time, so changing it never moves the underlying clock — it
      just relabels it. NTP keeps that clock honest by gently **slewing** it
      (speeding/slowing the tick) for small drifts rather than jumping, so
      timestamps never run backwards and break logs or `make`.
    cards:
      - front: "In cron's five fields, what does `*/15 * * * *` mean?"
        back: "Run every 15 minutes (every 15th minute, every hour, every day)."
      - front: "Which command schedules a single one-off job at a given time?"
        back: "`at` — e.g. `echo 'cmd' | at 23:30`; list with `atq`, remove with `atrm`."
      - front: "How do you set the system timezone on a systemd machine?"
        back: "`sudo timedatectl set-timezone <Zone>`, e.g. `Asia/Tehran`."
      - cloze: "A crontab line `0 2 * * *` runs the job at {{c1::02:00}} every day; the five fields are minute hour day-of-month month {{c2::day-of-week}}."
    feynman:
      - "Explain the five cron fields and write a schedule for 'every weekday at 6pm'."
      - "When would you use `at` instead of `cron`?"
    labs:
      - title: "Automate a nightly backup"
        slug: lab-cron-backup
        difficulty: core
        est_minutes: 18
        scenario: |
          The backup script from the scripting chapter should run automatically
          every night and log its output.
        deliverable: |
          1. Write a crontab entry that runs `~/backup.sh /data` every night at
             01:30 and appends stdout+stderr to `~/backup.log`.
          2. Show how to list your current crontab.
          3. Write the cron line for "every weekday (Mon–Fri) at 18:00".
        hints: |
          - Redirect both streams: `>> ~/backup.log 2>&1`
          - `crontab -l`
          - Weekdays: `1-5` in the day-of-week field.
        solution: |
          ```bash
          # crontab -e , then add:
          30 1 * * *  /home/leily/backup.sh /data >> /home/leily/backup.log 2>&1
          0 18 * * 1-5  /home/leily/standup.sh
          # list:
          crontab -l
          ```

quiz:
  title: "Administrative Tasks — chapter exam"
  slug: lpic1-admin-tasks-exam
  scope: chapter
  description: "Users/groups, password aging, login monitoring, cron/at, locale and time."
  questions:
    - type: mcq
      text: "Which file contains the password hashes?"
      explanation: "`/etc/shadow` holds hashes and aging info, readable only by root."
      choices:
        - {text: "/etc/shadow", correct: true}
        - {text: "/etc/passwd"}
        - {text: "/etc/group"}
        - {text: "/etc/hosts"}
    - type: command
      text: "Add user 'sara' to the 'devs' group WITHOUT removing her other groups."
      explanation: "`usermod -aG devs sara` appends; omit -a and you'd replace all groups."
      answers:
        - {value: "(sudo )?usermod -aG devs sara", match: regex}
        - {value: "(sudo )?usermod -a -G devs sara", match: regex}
    - type: mcq
      text: "What does the cron schedule `*/15 * * * *` do?"
      explanation: "Runs every 15 minutes."
      choices:
        - {text: "Runs every 15 minutes", correct: true}
        - {text: "Runs at 15:00 daily"}
        - {text: "Runs on the 15th of each month"}
        - {text: "Runs every 15 hours"}
    - type: command
      text: "Show your current user's crontab entries."
      explanation: "`crontab -l` lists the current user's crontab."
      answers:
        - "crontab -l"
    - type: true_false
      text: "`usermod -G devs sara` keeps Sara in all her previous groups and just adds devs."
      explanation: "False — without -a it REPLACES her supplementary groups with only devs."
      choices:
        - {text: "True"}
        - {text: "False", correct: true}
    - type: command
      text: "Set the system timezone to Asia/Tehran."
      explanation: "`timedatectl set-timezone Asia/Tehran`."
      answers:
        - {value: "(sudo )?timedatectl set-timezone Asia/Tehran", match: regex}
    - type: command
      text: "Force user 'ali' to change his password at his next login."
      explanation: "`chage -d 0 ali` sets the last-change date to day 0, expiring the password; `passwd -e ali` does the same."
      answers:
        - {value: "(sudo )?chage -d 0 ali", match: regex}
        - {value: "(sudo )?passwd -e ali", match: regex}
    - type: mcq
      text: "Which command shows who is logged in AND what each user is currently running?"
      explanation: "`w` = `who` plus each session's current command and the load average."
      choices:
        - {text: "w", correct: true}
        - {text: "who"}
        - {text: "last"}
        - {text: "lastlog"}
    - type: mcq
      text: "What does the 2 in `chmod 2770 /srv/projects/backend` do?"
      explanation: "It sets the setgid bit: files created inside inherit the directory's group instead of the creator's primary group."
      choices:
        - {text: "New files inside inherit the directory's group (setgid)", correct: true}
        - {text: "Only the owner can delete files (sticky bit)"}
        - {text: "Files run with the owner's privileges (setuid)"}
        - {text: "It makes the directory read-only for the group"}
    - type: true_false
      text: "`passwd -l ali` deletes ali's password hash, so unlocking requires setting a new password."
      explanation: "False — it only prepends `!` to the hash; `passwd -u` removes it and the old password works again."
      choices:
        - {text: "True"}
        - {text: "False", correct: true}
    - type: mcq
      text: "Which command shows the login HISTORY (past sessions and reboots)?"
      explanation: "`last` reads /var/log/wtmp, the permanent login history; `who`/`w` only show current sessions from utmp."
      choices:
        - {text: "last", correct: true}
        - {text: "w"}
        - {text: "who -H"}
        - {text: "history"}
