chapter:
  title: "Essential System Services"
  slug: system-services
  order: 9
  summary: "Keep time in sync, manage logs with systemd-journald and syslog, write and override systemd units, and understand mail/print basics."

lessons:
  - title: "System logging and time"
    slug: logging-and-time
    order: 1
    est_minutes: 24
    summary: "journalctl, the syslog facilities/severities, log rotation, and NTP."
    body: |
      ## Two logging worlds

      Modern systems run **systemd-journald** (binary journal) often alongside a
      classic **syslog** daemon (rsyslog) writing text files in `/var/log`.

      ### Reading the journal

      ```bash
      journalctl -u nginx              # logs for one unit
      journalctl -u nginx -f           # follow live
      journalctl --since "1 hour ago"  # time filter
      journalctl -p err -b             # only errors, this boot
      journalctl --disk-usage          # how big the journal is
      ```

      ### Classic log files

      ```
      /var/log/syslog      general system messages (Debian)
      /var/log/messages    general messages (RHEL)
      /var/log/auth.log    authentication / sudo (Debian)
      /var/log/secure      authentication (RHEL)
      ```

      Syslog classifies each message by **facility** (auth, cron, kern, mail…)
      and **severity** (emerg=0 … debug=7).

      ### Log rotation

      `logrotate` (config in `/etc/logrotate.conf` and `/etc/logrotate.d/`)
      compresses and prunes old logs so disks don't fill.

      ## Keeping time in sync (NTP)

      Accurate clocks matter for logs, TLS, and auth. On systemd:

      ```bash
      timedatectl                      # shows "NTP service: active"
      timedatectl set-ntp true         # enable network time sync
      ```
    deep_dive: |
      ### Why journald is binary and how syslog priorities work

      **journald captures more because it sits at the source.** A systemd service's
      stdout/stderr are wired straight to the journal socket, so journald records
      each line *with trusted metadata it adds itself* — the originating unit, PID,
      UID, boot ID, and a monotonic timestamp — that a program writing plain text
      could lie about or omit. Storing this as an indexed **binary** file is what
      makes `journalctl -u nginx -p err` a fast field query rather than a `grep`
      over gigabytes; the trade-off is you need `journalctl` to read it.

      **Syslog encodes priority as one number.** The classic protocol tags every
      message with a **facility** (which subsystem: `auth`, `cron`, `kern`,
      `mail`…) and a **severity** (`emerg`=0 … `debug`=7), combined into a single
      priority value `facility × 8 + severity`. rsyslog routes on those: that's how
      auth messages land in `/var/log/auth.log` while kernel messages go elsewhere,
      all from one stream.

      **logrotate and the reopen problem.** A daemon holds its logfile by open *fd*,
      so renaming `app.log` to `app.log.1` doesn't redirect its writes — it keeps
      filling the renamed inode (recall: the name is just a pointer). logrotate
      therefore either signals the daemon (often `SIGHUP`) to **reopen** its file,
      or uses `copytruncate` to copy-then-zero the original in place. Get this wrong
      and "rotated" logs keep growing invisibly.
    cards:
      - front: "How do you view and follow the logs of a single systemd unit?"
        back: "`journalctl -u <unit> -f` (`-u` selects the unit, `-f` follows live)."
      - front: "What are syslog 'facility' and 'severity'?"
        back: "Facility = message source/category (auth, cron, kern, mail…); severity = importance from emerg(0) to debug(7)."
      - front: "What does logrotate do and where is it configured?"
        back: "Rotates, compresses, and prunes log files so disks don't fill — configured in `/etc/logrotate.conf` and `/etc/logrotate.d/`."
      - cloze: "On systemd, the binary log service is `{{c1::journald}}` (read with `{{c2::journalctl}}`), and network time sync is enabled with `timedatectl set-ntp {{c3::true}}`."
    feynman:
      - "Explain why accurate time (NTP) matters for security logs and TLS."
      - "Compare journald and rsyslog — why might a server run both?"
    labs:
      - title: "Investigate a failing service"
        slug: lab-investigate-service
        difficulty: core
        est_minutes: 20
        scenario: |
          A service keeps restarting. You must gather evidence from the logs and
          confirm the clock is trustworthy before blaming anything.
        deliverable: |
          1. Show the last 50 log lines for a unit of your choice.
          2. Show only the errors from the current boot.
          3. Confirm NTP sync is active and the timezone is correct.
        hints: |
          - `journalctl -u <unit> -n 50`
          - `journalctl -p err -b`
          - `timedatectl`
        solution: |
          ```bash
          journalctl -u ssh -n 50
          journalctl -p err -b
          timedatectl              # check "System clock synchronized: yes"
          ```

  - title: "systemd units: write, wire, and override services"
    slug: systemd-units
    order: 2
    est_minutes: 30
    summary: "Unit file anatomy ([Unit]/[Service]/[Install]), dependencies vs ordering, Type=, the stop/kill sequence, and drop-in overrides with systemctl edit."
    body: |
      ## What a unit file is

      Everything systemd manages — services, mounts, timers, targets — is
      described by a small INI-style **unit file**. Three directories matter,
      and their precedence is the whole trick:

      ```
      /usr/lib/systemd/system/   vendor units (installed by packages — don't edit)
      /run/systemd/system/       runtime units (generated, gone after reboot)
      /etc/systemd/system/       admin units (yours — highest priority)
      ```

      A unit in `/etc` **shadows** the vendor unit of the same name. See the
      full effective picture with:

      ```bash
      systemctl cat nginx.service       # every file + drop-in that applies
      systemctl show nginx -p FragmentPath,DropInPaths
      ```

      ## Anatomy: the three sections

      ```ini
      [Unit]
      Description=A high performance web server and a reverse proxy server
      Documentation=man:nginx(8)
      After=network.target nss-lookup.target
      Wants=uwsgi.service

      [Service]
      Type=forking
      PIDFile=/run/nginx.pid
      ExecStartPre=/usr/sbin/nginx -t -q -g 'daemon on; master_process on;'
      ExecStart=/usr/sbin/nginx -g 'daemon on; master_process on;'
      ExecReload=/usr/sbin/nginx -g 'daemon on; master_process on;' -s reload
      ExecStop=-/sbin/start-stop-daemon --quiet --stop --retry QUIT/5 --pidfile /run/nginx.pid
      TimeoutStopSec=5
      KillMode=mixed

      [Install]
      WantedBy=multi-user.target
      ```

      **`[Unit]` — identity and relationships.** Two ideas people mix up:

      | Directive | Question it answers |
      |-----------|--------------------|
      | `After=` / `Before=` | *When* do I start relative to X? (ordering only) |
      | `Wants=` | Start X with me; keep going if X fails (soft dep) |
      | `Requires=` | Start X with me; if X fails/stops, stop me too (hard dep) |
      | `Conflicts=` | X and I can never run at the same time |

      `Requires=` **without** `After=` starts both *in parallel* — if you need
      X up first, you must say both. Prefer `Wants=` unless the service is
      truly useless without the dependency; hard deps cause cascade failures.

      **`[Service]` — how to run it.** `Type=` tells systemd when to consider
      the service "started":

      - `simple` (default) — the `ExecStart` process *is* the service; started
        as soon as it's forked.
      - `forking` — classic daemons that fork and exit the parent; systemd
        waits for the parent to exit and tracks the child via `PIDFile=`.
      - `oneshot` — runs to completion (setup scripts); pair with
        `RemainAfterExit=yes`.
      - `notify` — the service itself tells systemd "ready" via `sd_notify()`
        — the most precise.

      `ExecStartPre=` runs checks first (nginx validates its config — a bad
      config fails the *start*, it doesn't kill a running server). A leading
      `-` on any `Exec*` line means "ignore this command's failure".

      **The stop sequence** (read `ExecStop` → `TimeoutStopSec` → `KillMode`
      as one story):

      1. `systemctl stop` runs `ExecStop=` (here: graceful `QUIT`, retried 5s).
      2. Still alive after `TimeoutStopSec=5`? systemd sends **SIGTERM**.
      3. Still alive? **SIGKILL** — to whom depends on `KillMode=`:
         `control-group` (default: everyone), `mixed` (SIGTERM to main
         process only, SIGKILL to the whole group), `process` (main only —
         leaks workers, avoid).

      **`[Install]` — what `enable` means.** `WantedBy=multi-user.target`
      means `systemctl enable` creates a symlink in
      `/etc/systemd/system/multi-user.target.wants/`. Enable is *just a
      symlink*; start is *running it now*. Hence the pairs:

      ```bash
      sudo systemctl enable --now myapp.service    # symlink + start
      systemctl is-enabled myapp; systemctl is-active myapp
      ```

      ## Overriding a vendor unit — never edit /usr/lib

      Package updates overwrite `/usr/lib/systemd/system/nginx.service`. To
      change *one* setting, use a **drop-in**:

      ```bash
      sudo systemctl edit nginx.service
      ```

      This opens an editor on
      `/etc/systemd/system/nginx.service.d/override.conf` — write **only the
      sections and keys you want to change**; everything else is inherited:

      ```ini
      [Service]
      TimeoutStopSec=30
      ```

      Careful with list-type directives: `Exec*` lines *append*, so to replace
      one you must clear it first (`ExecStart=` on an empty line, then the new
      value). `sudo systemctl edit --full` copies the whole unit into `/etc`
      instead (full shadow). After *any* on-disk change:

      ```bash
      sudo systemctl daemon-reload      # re-parse unit files
      sudo systemctl restart nginx
      systemctl cat nginx               # verify what's in effect
      ```
    deep_dive: |
      ### cgroups, readiness, and why daemon-reload exists

      **systemd tracks services with cgroups, not PIDs.** Every service runs in
      its own **control group** (`/sys/fs/cgroup/system.slice/nginx.service/`),
      and the kernel keeps the member list — so even if a daemon forks twenty
      workers or double-forks to escape its parent, systemd still knows exactly
      which processes belong to it (`systemd-cgls` shows the tree). That is
      what makes `KillMode=control-group` airtight in a way old SysV scripts,
      which could only guess via `pidof`/PID files, never were. It's also why
      `systemctl status` can show you every process of a service and its
      aggregate CPU/memory: the cgroup *is* the accounting boundary.

      **`Type=` is really a readiness protocol.** Ordering (`After=`) is only
      useful if "started" means "ready to serve", and each type defines that
      moment differently. `forking` trusts the SysV convention — parent exits
      ⇒ child is initialized — and needs `PIDFile=` because after the fork the
      *main PID changes* and systemd must be told which process is the real
      daemon. `notify` closes the gap properly: the service writes `READY=1`
      into a Unix datagram socket systemd passed via `$NOTIFY_SOCKET`, so
      dependents start at the exact moment the service says so. `simple`
      merely means "the process exists" — which is why services that depend
      on a `simple` unit sometimes race it during boot.

      **`daemon-reload` exists because systemd runs from memory.** PID 1
      parses every unit file (plus its drop-ins, in lexical order) into an
      in-memory dependency graph at boot; the files on disk are just source
      code. Editing a file changes nothing until `daemon-reload` re-parses it
      — systemd even prints a warning if a unit's on-disk mtime is newer than
      what it has loaded. `enable`, meanwhile, never touches that graph
      directly: it materializes the `[Install]` section into `.wants/`
      symlinks, and at boot the target simply pulls in everything its
      `.wants/` directory points at. That's the whole "registry": readable
      with `ls`, fixable with `ln -s`, no hidden database anywhere.
    cards:
      - front: "In a unit file, what is the difference between `After=` and `Requires=`?"
        back: "`After=` is *ordering only* (start me after X). `Requires=` is a *hard dependency* (start X with me; if X fails, I stop) — but it implies no ordering, so you usually need both."
      - front: "What does `Type=forking` mean, and what directive usually accompanies it?"
        back: "The daemon forks and the parent exits — systemd considers it started when the parent exits, and needs `PIDFile=` to know which child is the main process."
      - front: "How do you change one setting of a vendor unit without editing /usr/lib?"
        back: "`sudo systemctl edit <unit>` — writes a drop-in at `/etc/systemd/system/<unit>.d/override.conf` containing only the keys you override; then `daemon-reload`."
      - front: "What happens, step by step, when `systemctl stop` can't stop a service gracefully?"
        back: "1) `ExecStop=` runs; 2) after `TimeoutStopSec` systemd sends SIGTERM; 3) still alive → SIGKILL, scoped by `KillMode=` (control-group / mixed / process)."
      - cloze: "Admin units live in `{{c1::/etc/systemd/system}}` and shadow vendor units in `/usr/lib/systemd/system`; after editing any unit file you must run `systemctl {{c2::daemon-reload}}`; `systemctl enable` just creates a symlink in the target's `{{c3::.wants}}` directory."
    feynman:
      - "Explain to a junior engineer why `systemctl enable` and `systemctl start` are different operations, and what actually happens on disk for each."
      - "Walk through the nginx stop sequence (ExecStop → SIGTERM → SIGKILL) and explain what KillMode=mixed changes about the final step."
    labs:
      - title: "Ship your own service, then override it"
        slug: lab-write-systemd-unit
        difficulty: core
        est_minutes: 30
        scenario: |
          You wrote a tiny web service and want it managed like a real daemon:
          started at boot, restarted on crash, cleanly stoppable — and then you
          need to tweak it *without* touching the original unit file, the way
          you'd override a vendor package's unit in production.
        deliverable: |
          1. Create `/opt/heartbeat/beat.sh` — an executable script that loops
             forever, logging a line every 5 seconds (stdout is fine — journald
             will catch it).
          2. Write `/etc/systemd/system/heartbeat.service` with a `[Unit]`
             description, `Type=simple`, `Restart=on-failure`, and
             `WantedBy=multi-user.target`. Enable and start it.
          3. Prove it works: show its status, follow its journal, kill the
             process by PID and show systemd restarted it.
          4. Now change its restart delay to 10 s using a **drop-in override**
             (not by editing the unit), and prove the override is active with
             `systemctl cat heartbeat`.
          5. Clean up: stop, disable, remove the files, `daemon-reload`.
        hints: |
          - Script: `#!/bin/bash` + `while true; do echo "alive $(date)"; sleep 5; done`
          - Minimal `[Service]`: `ExecStart=/opt/heartbeat/beat.sh`, `Restart=on-failure`, `RestartSec=2`
          - `sudo systemctl enable --now heartbeat`
          - Watch the restart: `journalctl -u heartbeat -f` in one terminal,
            `sudo kill $(systemctl show -p MainPID --value heartbeat)` in another.
          - Override: `sudo systemctl edit heartbeat` → `[Service]` + `RestartSec=10`
        solution: |
          ```bash
          # 1. the "daemon"
          sudo mkdir -p /opt/heartbeat
          sudo tee /opt/heartbeat/beat.sh >/dev/null <<'EOF'
          #!/bin/bash
          while true; do echo "alive $(date --iso-8601=seconds)"; sleep 5; done
          EOF
          sudo chmod +x /opt/heartbeat/beat.sh

          # 2. the unit
          sudo tee /etc/systemd/system/heartbeat.service >/dev/null <<'EOF'
          [Unit]
          Description=Heartbeat demo service

          [Service]
          Type=simple
          ExecStart=/opt/heartbeat/beat.sh
          Restart=on-failure
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable --now heartbeat

          # 3. prove it
          systemctl status heartbeat --no-pager
          journalctl -u heartbeat -n 5
          sudo kill $(systemctl show -p MainPID --value heartbeat)
          sleep 3; systemctl status heartbeat --no-pager   # new MainPID, restart counter +1

          # 4. drop-in override (non-interactive equivalent of systemctl edit)
          sudo mkdir -p /etc/systemd/system/heartbeat.service.d
          sudo tee /etc/systemd/system/heartbeat.service.d/override.conf >/dev/null <<'EOF'
          [Service]
          RestartSec=10
          EOF
          sudo systemctl daemon-reload
          systemctl cat heartbeat            # shows unit + the drop-in
          systemctl show -p RestartUSec --value heartbeat   # 10s

          # 5. cleanup
          sudo systemctl disable --now heartbeat
          sudo rm -rf /etc/systemd/system/heartbeat.service \
                      /etc/systemd/system/heartbeat.service.d \
                      /opt/heartbeat
          sudo systemctl daemon-reload
          ```

  - title: "Mail and printing basics"
    slug: mail-and-printing
    order: 3
    est_minutes: 14
    summary: "The MTA concept and the CUPS print stack at a high level."
    body: |
      ## Mail Transfer Agents (MTAs)

      An **MTA** moves email between servers using **SMTP**. Common ones:
      **Postfix** (popular), **Sendmail**, **Exim**. Locally, the `mail` command
      and the MTA deliver to mailboxes (often `/var/mail/<user>`).

      ```bash
      echo "body" | mail -s "subject" leily   # send local mail
      mailq                                    # view the mail queue
      ```

      `newaliases` rebuilds `/etc/aliases` (e.g. forward root's mail to you).

      ## Printing with CUPS

      **CUPS** (Common Unix Printing System) is the print server; it speaks
      **IPP** and has a web UI on `http://localhost:631`.

      ```bash
      lpstat -p -d        # printers and the default
      lp -d printer file  # print a file
      lpq                 # print queue
      lprm 4              # cancel job 4
      ```
    deep_dive: |
      ### Store-and-forward mail and the CUPS pipeline

      **SMTP is store-and-forward, not a live transfer.** When you submit a
      message, the MTA writes it to an on-disk **queue** and *then* tries to deliver
      — so if the next hop is down, it retries on a backoff schedule for days
      rather than failing outright (`mailq` shows what's waiting). Where to send it
      comes from DNS **MX records** for the recipient's domain, which is the bridge
      between this chapter and DNS. For a local user the MTA hands off to a local
      delivery agent that appends to `/var/mail/<user>` (mbox) or a Maildir, after
      consulting `/etc/aliases` and `~/.forward` to redirect or fan out addresses.

      **CUPS is a tiny web server that transforms documents.** The CUPS daemon
      speaks **IPP** layered over HTTP (hence the admin UI on port 631) and keeps a
      per-printer spool queue just like mail. The interesting part is the **filter
      chain**: your PDF or text is pushed through a series of filters that convert
      it step by step into the printer's own language, guided by a PPD or — on
      modern "driverless" IPP printers — by capabilities the printer advertises
      itself. `lp` enqueues a job, `lpstat`/`lpq` inspect the spool, and `lprm`
      pulls a job back out before it prints.
    cards:
      - front: "What protocol do MTAs use to transfer mail between servers?"
        back: "SMTP. Common MTAs: Postfix, Sendmail, Exim."
      - front: "What is CUPS and what port/UI does it expose?"
        back: "The Common Unix Printing System (print server); web UI on port 631, speaks IPP."
      - cloze: "`{{c1::lpstat}} -p -d` lists printers and the default, and `{{c2::lpq}}` shows the print queue."
    feynman:
      - "Describe the path an email takes from your `mail` command to a remote inbox."
    labs:
      - title: "Map the local mail + print tools"
        slug: lab-mail-print-tools
        difficulty: intro
        est_minutes: 10
        scenario: |
          You want a quick reference for inspecting mail and print state on a box.
        deliverable: |
          List the command to: (1) view the mail queue, (2) list printers and the
          default, (3) view the print queue, (4) cancel a print job.
        hints: |
          - `mailq`, `lpstat`, `lpq`, `lprm`
        solution: |
          ```bash
          mailq                 # mail queue
          lpstat -p -d          # printers + default
          lpq                   # print queue
          lprm <job-id>         # cancel a job
          ```

quiz:
  title: "Essential System Services — chapter exam"
  slug: lpic1-system-services-exam
  scope: chapter
  description: "Logging, time, systemd units, mail, and printing."
  questions:
    - type: command
      text: "Follow the live logs of the systemd unit named nginx."
      explanation: "`journalctl -u nginx -f`."
      answers:
        - "journalctl -u nginx -f"
        - {value: "journalctl -f -u nginx", match: exact}
    - type: mcq
      text: "Which protocol do mail servers use to relay email to each other?"
      explanation: "SMTP is the mail transfer protocol."
      choices:
        - {text: "SMTP", correct: true}
        - {text: "IMAP"}
        - {text: "SNMP"}
        - {text: "HTTP"}
    - type: mcq
      text: "What is the job of logrotate?"
      explanation: "It compresses and prunes old log files so disks don't fill."
      choices:
        - {text: "Rotate/compress/prune log files", correct: true}
        - {text: "Encrypt logs"}
        - {text: "Forward logs to email"}
        - {text: "Sync the clock"}
    - type: command
      text: "Enable automatic network time synchronization (systemd)."
      explanation: "`timedatectl set-ntp true`."
      answers:
        - {value: "(sudo )?timedatectl set-ntp (true|on)", match: regex}
    - type: true_false
      text: "CUPS exposes a web interface on port 631."
      explanation: "True — http://localhost:631."
      choices:
        - {text: "True", correct: true}
        - {text: "False"}
    - type: mcq
      text: "In a unit file, which directive makes X a hard dependency (if X fails, this unit stops too)?"
      explanation: "`Requires=` is the hard dependency; `Wants=` is soft; `After=` is ordering only."
      choices:
        - {text: "Requires=", correct: true}
        - {text: "Wants="}
        - {text: "After="}
        - {text: "Before="}
    - type: mcq
      text: "Where should an administrator's own unit files (and overrides) live?"
      explanation: "/etc/systemd/system — it shadows the vendor units in /usr/lib/systemd/system."
      choices:
        - {text: "/etc/systemd/system", correct: true}
        - {text: "/usr/lib/systemd/system"}
        - {text: "/run/systemd/system"}
        - {text: "/var/lib/systemd"}
    - type: command
      text: "You edited a unit file on disk. Make systemd re-read its configuration."
      explanation: "`systemctl daemon-reload` re-parses unit files into PID 1's in-memory graph."
      answers:
        - {value: "(sudo )?systemctl daemon-reload", match: regex}
    - type: command
      text: "Create a drop-in override for nginx.service using the built-in editor workflow."
      explanation: "`systemctl edit nginx.service` writes /etc/systemd/system/nginx.service.d/override.conf."
      answers:
        - {value: "(sudo )?systemctl edit nginx(\\.service)?", match: regex}
    - type: mcq
      text: "A service with Type=forking is considered started when…"
      explanation: "The classic daemon convention: the parent exits once the child is initialized; PIDFile= tells systemd which process is the daemon."
      choices:
        - {text: "the ExecStart parent process exits", correct: true}
        - {text: "the ExecStart process is forked"}
        - {text: "it writes READY=1 to the notify socket"}
        - {text: "its port starts accepting connections"}
