chapter:
  title: "Deploy, Secrets and Environments"
  slug: deploy-secrets-environments
  order: 5
  summary: "Ship the image safely: manage secrets, gate environments, and choose a deployment strategy."

lessons:
  - title: "Secrets, environments, and deployment strategies"
    slug: deploy-and-secrets
    order: 1
    est_minutes: 24
    summary: "Inject secrets safely, gate prod behind approvals, and roll out without downtime."
    body: |
      ## Secrets in CI

      Never hardcode credentials. Store them in the platform's secret store and
      reference them; the runner injects them at runtime and **masks** them in logs.

      ```yaml
      steps:
        - run: ./deploy.sh
          env:
            API_TOKEN: ${{ secrets.API_TOKEN }}
      ```

      Rules: least privilege, prefer short-lived/OIDC over long-lived keys, rotate
      regularly, never `echo` a secret.

      ## Environments and approvals

      Define **environments** (`staging`, `production`) with their own secrets and
      **protection rules** — e.g. require a manual approval before prod:

      ```yaml
      deploy-prod:
        needs: deploy-staging
        environment: production      # can require reviewers/approval
        runs-on: ubuntu-latest
        steps:
          - run: ./deploy.sh prod
      ```

      ## Deployment strategies

      | Strategy | How | Benefit |
      |----------|-----|---------|
      | **Rolling** | replace instances a few at a time | no downtime, gradual |
      | **Blue-green** | run new (green) beside old (blue), switch traffic | instant rollback |
      | **Canary** | send a small % of traffic to the new version first | limit blast radius |

      Always have a **rollback** path (deploy the previous digest) and a
      **healthcheck** gate (Docker course) so a bad release is caught and reverted.
    deep_dive: |
      ### How secrets stay secret, and what "environment" really buys you

      **Secret handling under the hood.** A CI secret is stored **encrypted** by the
      platform and only **decrypted into a job's memory/env at runtime** — it's not
      in the repo, not in the YAML, and not in the logs. The runner also **masks**
      known secret values: if a secret string would appear in output it's replaced
      with `***`. Key consequences that trip people up:
      - Secrets are **not passed to workflows triggered by PRs from forks** (an
        untrusted contributor could otherwise exfiltrate them) — a deliberate
        security boundary.
      - Masking is string-matching, so you can still leak a secret by transforming
        it (base64, slicing). The rule "never echo/transform a secret" is about not
        defeating the mask.
      - The strongest posture avoids stored secrets entirely via **OIDC**: the job
        proves its identity to the cloud and receives **short-lived** credentials
        that expire in minutes, so a leak is low-value and self-healing — the same
        ephemeral-credential principle as the registry lesson.

      **Environments are a control plane, not just a label.** Attaching a job to an
      `environment: production` lets the platform enforce **protection rules**:
      required **reviewers** (a human must approve before the deploy job runs),
      **wait timers**, and **environment-scoped secrets** (prod creds exist only for
      the prod environment). This is how "Continuous Delivery" (human-gated) is
      implemented: the pipeline is fully automated up to the prod environment, which
      pauses for approval; remove the gate and you have Continuous Deployment.

      **Why deployment strategy is a risk dial.** Replacing all instances at once
      means a bad release is a full outage. The strategies trade speed for safety by
      controlling **how much traffic meets the new version, when**:
      - *Rolling* updates a few instances at a time; a healthcheck failure halts the
        rollout before it's everywhere.
      - *Blue-green* keeps the old version fully running and just **flips the
        router** to the new one — rollback is another instant flip.
      - *Canary* exposes a small percentage first and watches metrics/errors, then
        ramps up or aborts.
      All three depend on two things you already built: a **healthcheck/readiness**
      signal (so the system knows the new version is actually serving) and an
      **immutable artifact identity** (deploy/rollback by **digest**, so "go back"
      means "point at the previous known-good digest"). CI/CD safety is really the
      composition of everything in this platform: green tests gate the build, the
      image is content-addressed and traceable to a commit, secrets are ephemeral
      and least-privilege, and the rollout is observable and reversible.
    cards:
      - front: "How does a CI platform keep a secret out of logs?"
        back: "It stores it encrypted, decrypts it only into the job at runtime (never in the repo/YAML), and **masks** the value (`***`) if it appears in output."
      - front: "Why are secrets withheld from fork PR workflows?"
        back: "An untrusted contributor's PR code could otherwise read and exfiltrate them — it's a deliberate security boundary."
      - front: "What do GitHub 'environments' let you enforce for production?"
        back: "Protection rules: required reviewers/approvals, wait timers, and environment-scoped secrets — which is how human-gated Continuous Delivery is implemented."
      - front: "Rolling vs blue-green vs canary?"
        back: "Rolling: replace instances a few at a time. Blue-green: run new beside old and switch traffic (instant rollback). Canary: send a small % of traffic to the new version first to limit blast radius."
      - front: "What two earlier features make safe deploy/rollback possible?"
        back: "A healthcheck/readiness signal (know the new version serves) and an immutable image digest (deploy/rollback by pointing at a known-good digest)."
      - cloze: "Reference a secret as `${{ secrets.{{c1::NAME}} }}`; the runner injects it at runtime and {{c2::masks}} it in logs."
    feynman:
      - "Explain how an `environment: production` gate turns an automated pipeline into human-gated Continuous Delivery."
      - "Why does deploying by digest make rollback trivial and reliable?"
    labs:
      - title: "Gated production deploy"
        slug: lab-gated-deploy
        difficulty: challenge
        est_minutes: 26
        scenario: |
          You must deploy to staging automatically, but production should require a
          human approval and use prod-only secrets — with a safe rollback plan.
        deliverable: |
          Design the deploy portion of a workflow that:
          1. Deploys to a `staging` environment automatically after the image is pushed.
          2. Deploys to a `production` environment that requires manual approval.
          3. Pulls deployment credentials from environment-scoped secrets (no hardcoding).
          4. States how you'd roll back a bad prod release.
        hints: |
          - environment: staging / production; needs:; secrets.*; deploy by digest
        solution: |
          ```yaml
          deploy-staging:
            needs: build-image
            environment: staging
            runs-on: ubuntu-latest
            steps:
              - run: ./deploy.sh staging ghcr.io/${{ github.repository }}@${{ needs.build-image.outputs.digest }}
                env: { DEPLOY_TOKEN: ${{ secrets.STAGING_TOKEN }} }
          deploy-prod:
            needs: deploy-staging
            environment: production        # configured to require a reviewer's approval
            runs-on: ubuntu-latest
            steps:
              - run: ./deploy.sh prod ghcr.io/${{ github.repository }}@${{ needs.build-image.outputs.digest }}
                env: { DEPLOY_TOKEN: ${{ secrets.PROD_TOKEN }} }
          ```
          Rollback = re-run the deploy pointing at the **previous known-good
          digest** — immutable, so it restores the exact prior version.

quiz:
  title: "Deploy, Secrets & Environments — chapter exam"
  slug: cicd-deploy-secrets-exam
  scope: chapter
  description: "Secrets, environments, and deployment strategies."
  questions:
    - type: mcq
      text: "How should deployment credentials be provided to a CI job?"
      explanation: "Via the encrypted secret store (or OIDC), injected at runtime — never hardcoded."
      choices:
        - {text: "From the encrypted secret store / OIDC, injected at runtime", correct: true}
        - {text: "Committed in the workflow YAML"}
        - {text: "Printed to the logs"}
        - {text: "Hardcoded in the Dockerfile"}
    - type: mcq
      text: "What does attaching a job to `environment: production` enable?"
      explanation: "Protection rules like required approvals, wait timers, and env-scoped secrets."
      choices:
        - {text: "Required approvals and environment-scoped secrets", correct: true}
        - {text: "Faster runners"}
        - {text: "Automatic caching"}
        - {text: "Skipping tests"}
    - type: mcq
      text: "Which deployment strategy switches all traffic from an old to a new identical environment for instant rollback?"
      explanation: "Blue-green keeps both and flips the router."
      choices:
        - {text: "Blue-green", correct: true}
        - {text: "Rolling"}
        - {text: "Canary"}
        - {text: "Big-bang"}
    - type: true_false
      text: "Secrets are normally exposed to workflows triggered by pull requests from forks."
      explanation: "False — they're withheld to prevent untrusted code from stealing them."
      choices:
        - {text: "True"}
        - {text: "False", correct: true}
    - type: mcq
      text: "What makes rolling back a deployment reliable?"
      explanation: "Redeploying the previous immutable image digest restores the exact prior version."
      choices:
        - {text: "Deploying the previous known-good image digest", correct: true}
        - {text: "Editing files on the server"}
        - {text: "Re-running tests"}
        - {text: "Clearing the cache"}
